<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Git Roulette Tracker</title>
</head>
<body>
    <video id="webcam" autoplay playsinline style="display:none;"></video>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        // --- VOICE RECOGNITION SETUP (For the ☝️ Commit) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            window.startVoiceRecognition = () => {
                try {
                    recognition.start();
                    console.log("VOICE_STATUS:Listening...");
                } catch (e) {
                    console.log("VOICE_ERROR:" + e.message);
                }
            };

            recognition.onresult = (event) => {
                const speechResult = event.results[0][0].transcript;
                console.log("VOICE_RESULT:" + speechResult);
            };

            recognition.onerror = (event) => {
                console.log("VOICE_ERROR:" + event.error);
            };

            recognition.onend = () => {
                console.log("VOICE_END");
            }
        } else {
            console.log("VOICE_ERROR: SpeechRecognition API not supported.");
        }

        // --- HAND TRACKER SETUP ---
        async function initializeTracker() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );

            const handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 2
            });

            const video = document.getElementById("webcam");
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            video.srcObject = stream;

            video.addEventListener("loadeddata", () => {
                let lastVideoTime = -1;
                
                function predictWebcam() {
                    let startTimeMs = performance.now();
                    if (video.currentTime !== lastVideoTime) {
                        lastVideoTime = video.currentTime;
                        const results = handLandmarker.detectForVideo(video, startTimeMs);
                        
                        if (results.landmarks && results.landmarks.length > 0) {
                            console.log("GESTURE_DATA:" + JSON.stringify(results.landmarks));
                        }
                    }
                    requestAnimationFrame(predictWebcam);
                }
                
                predictWebcam();
            });
        }

        initializeTracker().catch(err => console.error("TRACKER_ERROR:", err));
    </script>
</body>
</html>
